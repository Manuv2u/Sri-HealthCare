# =============================================================================
# nginx.prod.conf — Future Nginx reverse proxy config
#
# Use this when you add a domain and SSL (Let's Encrypt).
#
# Setup steps:
#   1. Install nginx:   sudo apt-get install -y nginx certbot python3-certbot-nginx
#   2. Copy this file:  sudo cp nginx.prod.conf /etc/nginx/sites-available/sri-diagnostics
#   3. Replace DOMAIN placeholders below with your real domain
#   4. Enable site:     sudo ln -sf /etc/nginx/sites-available/sri-diagnostics \
#                                   /etc/nginx/sites-enabled/sri-diagnostics
#   5. Get certificate: sudo certbot --nginx -d app.DOMAIN.com -d api.DOMAIN.com
#   6. Reload nginx:    sudo systemctl reload nginx
#
# Change docker-compose.prod.yml ports to:
#   frontend: "127.0.0.1:4200:4200"   (only on loopback — nginx handles 80/443)
#   backend:  "127.0.0.1:8080:8000"
# =============================================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.DOMAIN.com api.DOMAIN.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/app.DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.DOMAIN.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 256;

    location / {
        proxy_pass         http://127.0.0.1:4200;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Backend API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/api.DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.DOMAIN.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;

    # Max upload size (for report files)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
