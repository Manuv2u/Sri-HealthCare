# =============================================================================
# docker-compose.prod.yml — Sri Diagnostics Production
# Architecture: nginx → frontend / backend → postgres
# All data in /data bind mounts (survives container recreation)
# =============================================================================

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - /data/backups/db:/backups
    command: >
      postgres
        -c shared_buffers=6GB
        -c effective_cache_size=18GB
        -c maintenance_work_mem=512MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=32MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c max_connections=50
        -c log_min_duration_statement=1000
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"
    networks:
      - sri_net

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    image: sri-healthcare-backend:latest
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "-c", "alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --timeout 120 --graceful-timeout 30 --access-logfile - --error-logfile - --log-level info"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /data/uploads:/app/file_storage
      - /data/logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"
    networks:
      - sri_net

  # ── Angular Frontend ───────────────────────────────────────────────────────
  frontend:
    image: sri-healthcare-frontend:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - sri_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/sri-diagnostics/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/sri-diagnostics/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/logs/nginx:/var/log/nginx
      - /data/certbot/conf:/etc/letsencrypt:ro
      - /data/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - sri_net

networks:
  sri_net:
    driver: bridge
    name: sri_production_net
