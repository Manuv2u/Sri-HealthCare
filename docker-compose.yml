version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sri_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sri_lab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sri} -d ${POSTGRES_DB:-sri_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sri_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sri}:${POSTGRES_PASSWORD:-sri_secret}@postgres:5432/${POSTGRES_DB:-sri_lab}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - sri_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "4200"
    networks:
      - sri_net

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sri_net

volumes:
  pgdata:

networks:
  sri_net:
    driver: bridge
