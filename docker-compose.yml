services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sri_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sri_lab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sri} -d ${POSTGRES_DB:-sri_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sri_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sri}:${POSTGRES_PASSWORD:-sri_secret}@postgres:5432/${POSTGRES_DB:-sri_lab}
    entrypoint: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - sri_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:4200"
    networks:
      - sri_net

volumes:
  pgdata:

networks:
  sri_net:
    driver: bridge
